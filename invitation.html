<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>王栓 & 张倩 · 婚礼邀请</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,300;0,400;0,600;0,700;1,300;1,400;1,600&family=Noto+Serif+SC:wght@200;300;400;600;700;900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:"Noto Serif SC","Playfair Display",Georgia,serif;
  background:#0d0b0f;color:#f5ede8;overflow-x:hidden;min-height:100vh;
  display:flex;align-items:center;justify-content:center;
}
:root{--gold:#d4a76a;--gold-light:#e8c88a;--rose:#e8b4b8;--cream:#faf0e6;--dark:#0d0b0f;--warm:#1a1518}
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:#0d0b0f}
::-webkit-scrollbar-thumb{background:var(--gold);border-radius:3px}

.loader{position:fixed;inset:0;z-index:10001;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#0d0b0f;transition:opacity .8s ease,visibility .8s ease}
.loader.hidden{opacity:0;visibility:hidden}
.loader-ring{width:50px;height:50px;border:1px solid rgba(212,167,106,0.15);border-top-color:var(--gold);border-radius:50%;animation:lspin 1.2s linear infinite}
@keyframes lspin{to{transform:rotate(360deg)}}
.loader p{margin-top:16px;color:var(--gold);font-size:12px;letter-spacing:5px}

.bg-glow{position:fixed;inset:0;pointer-events:none;z-index:0}
.bg-glow::before{content:"";position:absolute;width:500px;height:500px;top:50%;left:50%;transform:translate(-50%,-50%);background:radial-gradient(circle,rgba(212,167,106,0.04) 0%,transparent 70%);border-radius:50%}

.sparkle-overlay{position:fixed;inset:0;pointer-events:none;z-index:9999;overflow:hidden}
.sparkle-star{position:absolute;color:var(--gold-light);animation:shimmer linear infinite;font-size:7px;opacity:0}
@keyframes shimmer{0%{opacity:0;transform:scale(0) rotate(0deg)}30%{opacity:0.6}100%{opacity:0;transform:scale(1.5) rotate(180deg) translateY(-20px)}}

/* Card */
.card{
  position:relative;z-index:1;
  max-width:960px;width:calc(100% - 30px);
  background:linear-gradient(160deg,#1a1518 0%,#120f12 50%,#1a1518 100%);
  border:1px solid rgba(212,167,106,0.12);
  border-radius:8px;overflow:hidden;
  box-shadow:0 40px 100px rgba(0,0,0,.5);
  display:flex;flex-direction:row;
  min-height:520px;
  animation:cardIn 1s ease 0.3s both;
}
@keyframes cardIn{0%{opacity:0;transform:translateY(30px) scale(0.97)}100%{opacity:1;transform:translateY(0) scale(1)}}

/* LEFT: Photos - crop top */
.card-photos{
  flex:0 0 46%;
  display:flex;flex-direction:column;
  position:relative;overflow:hidden;
}
.card-photos .photo-item{
  flex:1;overflow:hidden;position:relative;
}
.card-photos .photo-item:nth-child(1) img{
  width:100%;height:120%;object-fit:cover;object-position:center 12%;display:block;
  transition:transform 1.2s ease;
}
.card-photos .photo-item:nth-child(2) img{
  width:100%;height:100%;object-fit:cover;object-position:center 30%;display:block;
  transition:transform 1.2s ease;
}
.card-photos:hover .photo-item img{transform:scale(1.05)}
.card-photos .overlay{
  position:absolute;inset:0;z-index:1;
  background:linear-gradient(0deg,rgba(13,11,15,0.2) 0%,transparent 30%,transparent 70%,rgba(13,11,15,0.2) 100%);
  pointer-events:none;
}

/* RIGHT: Content */
.card-content{
  flex:1;display:flex;flex-direction:column;justify-content:center;align-items:center;
  padding:44px 36px;position:relative;
}
.card-content::before{
  content:"";position:absolute;left:0;top:10%;bottom:10%;width:1px;
  background:linear-gradient(180deg,transparent,var(--gold),transparent);
}

.top-ornament{font-size:12px;letter-spacing:8px;color:var(--gold);opacity:0.4;margin-bottom:10px;animation:fadeUp 0.8s ease 0.6s both}

.invite-title{text-align:center;margin-bottom:6px;animation:fadeUp 0.8s ease 0.8s both}
.invite-title h1{
  font-family:"Playfair Display",serif;
  font-size:clamp(20px,2.5vw,34px);font-weight:400;color:var(--cream);
  letter-spacing:6px;margin-bottom:2px;
}
.invite-title .sub{
  font-family:"Playfair Display",serif;
  font-size:clamp(12px,1.3vw,16px);font-style:italic;color:var(--gold);font-weight:300;
}

.divider{display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:12px;animation:fadeUp 0.8s ease 1s both}
.divider .line{width:40px;height:1px;background:linear-gradient(90deg,transparent,var(--gold))}
.divider .line:last-child{background:linear-gradient(90deg,var(--gold),transparent)}
.divider .diamond{color:var(--gold);font-size:6px}

/* Wedding info */
.wedding-info{
  width:100%;max-width:340px;padding:16px 20px;
  border:1px solid rgba(212,167,106,0.12);border-radius:6px;
  background:rgba(212,167,106,0.03);
  animation:fadeUp 0.8s ease 1.2s both;
}
.wedding-info .info-row{
  display:flex;align-items:center;gap:10px;padding:5px 0;
}
.wedding-info .info-row:not(:last-child){border-bottom:1px solid rgba(212,167,106,0.06);margin-bottom:4px;padding-bottom:9px}
.wedding-info .info-icon{color:var(--gold);font-size:15px;width:22px;text-align:center;flex-shrink:0}
.wedding-info .info-label{font-size:11px;letter-spacing:2px;color:var(--gold);opacity:0.6;width:50px;flex-shrink:0}
.wedding-info .info-value{font-size:clamp(13px,1.1vw,16px);color:var(--cream);opacity:0.9;letter-spacing:1px}

/* QR code */
.qr-mini{
  display:flex;align-items:center;gap:10px;margin-top:14px;
  padding:10px 16px;border:1px solid rgba(212,167,106,0.08);border-radius:6px;
  background:rgba(212,167,106,0.02);
  animation:fadeUp 0.8s ease 1.4s both;
}
.qr-mini img{width:44px;height:44px;border-radius:4px;display:block}
.qr-mini .qr-text{font-size:11px;color:var(--cream);opacity:0.5;letter-spacing:1px;line-height:1.5}
.qr-mini .qr-text span{display:block;color:var(--gold);opacity:0.6;font-size:11px;margin-bottom:1px;letter-spacing:2px}

/* Footer */
.card-footer{
  margin-top:14px;padding-top:10px;border-top:1px solid rgba(212,167,106,0.06);
  text-align:center;width:100%;
  animation:fadeUp 0.8s ease 1.8s both;
}
.card-footer p{
  font-family:"Playfair Display",serif;font-size:11px;font-style:italic;
  color:var(--gold);opacity:0.4;letter-spacing:3px;
}

@keyframes fadeUp{0%{opacity:0;transform:translateY(20px)}100%{opacity:1;transform:translateY(0)}}

@media(max-width:768px){
  .card{flex-direction:column;min-height:auto;max-width:420px}
  .card-photos{flex:none}
  .card-photos .photo-item{min-height:180px}
  .card-content{padding:28px 20px 24px}
  .card-content::before{display:none}
  .wedding-info{max-width:100%}
  .qr-mini{flex-direction:column;text-align:center}
}
@media(max-width:480px){
  .card-photos .photo-item{min-height:140px}
  .card-content{padding:22px 16px 20px}
}
</style>
</head>
<body>
<div class="loader" id="loader"><div class="loader-ring"></div><p>加载中...</p></div>
<div class="bg-glow"></div>
<div class="sparkle-overlay" id="sparkles"></div>

<div class="card">
  <div class="card-photos">
    <div class="photo-item"><img src="web/invite_top.jpg" alt="婚纱照"></div>
    <div class="photo-item"><img src="web/invite_bottom.jpg" alt="婚纱照"></div>
    <div class="overlay"></div>
  </div>
  <div class="card-content">
    <div class="top-ornament">✦ ✦ ✦</div>
    <div class="invite-title">
      <h1>结婚邀请</h1>
      <div class="sub">Wedding Invitation</div>
    </div>
    <div class="divider"><span class="line"></span><span class="diamond">◇</span><span class="line"></span></div>

    <div class="wedding-info">
      <div class="info-row">
        <span class="info-icon">♡</span>
        <span class="info-label">新郎</span>
        <span class="info-value">王 栓</span>
      </div>
      <div class="info-row">
        <span class="info-icon">♡</span>
        <span class="info-label">新娘</span>
        <span class="info-value">张 倩</span>
      </div>
      <div class="info-row">
        <span class="info-icon">✧</span>
        <span class="info-label">时间</span>
        <span class="info-value">2026年7月21日</span>
      </div>
    </div>

    <div class="qr-mini">
      <img src="https://api.qrserver.com/v1/create-qr-code/?size=250x250&data=https://zhanghongen18-star.github.io/wedding/" alt="二维码">
      <div class="qr-text">
        <span>✦ 扫码查看婚纱照 ✦</span>
        更多照片尽在纪念网站
      </div>
    </div>

    <div class="card-footer">
      <p>— ♥ 感谢您的祝福 ♥ —</p>
    </div>
  </div>
</div>

<script>
window.addEventListener("load",()=>{setTimeout(()=>document.getElementById("loader").classList.add("hidden"),500)});
(function(){
  const c=document.getElementById("sparkles");
  const syms=["✦","♥","·","✧"];
  for(let i=0;i<25;i++){
    const s=document.createElement("span");s.className="sparkle-star";
    s.textContent=syms[Math.floor(Math.random()*syms.length)];
    s.style.left=Math.random()*98+"%";s.style.top=Math.random()*98+"%";
    s.style.animationDuration=(4+Math.random()*5)+"s";s.style.animationDelay=Math.random()*8+"s";
    s.style.fontSize=(4+Math.random()*8)+"px";s.style.opacity=0.1+Math.random()*0.4;
    c.appendChild(s);
  }
})();
</script>
</body>
</html>
