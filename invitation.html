<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>爱 · 邀 — 婚纱纪念邀请</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,300;0,400;0,600;0,700;1,300;1,400;1,600&family=Noto+Serif+SC:wght@200;300;400;600;700;900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{
  font-family:'Noto Serif SC','Playfair Display',Georgia,serif;
  background:#0d0b0f;
  color:#f5ede8;
  overflow-x:hidden;
  line-height:1.8;
  min-height:100vh;
}
:root{
  --gold:#d4a76a;
  --gold-light:#e8c88a;
  --rose:#e8b4b8;
  --blush:#f2d7d5;
  --dusty-rose:#c98a8e;
  --cream:#faf0e6;
  --dark:#0d0b0f;
  --warm:#1a1518;
  --shadow:0 20px 60px rgba(0,0,0,.6);
  --shadow-lg:0 40px 100px rgba(0,0,0,.5);
}

/* Scrollbar */
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:#0d0b0f}
::-webkit-scrollbar-thumb{background:var(--gold);border-radius:3px}

/* ====== SPARKLE OVERLAY ====== */
.sparkle-overlay{
  position:fixed;inset:0;pointer-events:none;z-index:9999;
  overflow:hidden;
}
.sparkle-star{
  position:absolute;color:var(--gold-light);
  animation:shimmer linear infinite;
  font-size:8px;opacity:0;
}
@keyframes shimmer{
  0%{opacity:0;transform:scale(0) rotate(0deg)}
  30%{opacity:0.8}
  100%{opacity:0;transform:scale(1.5) rotate(180deg) translateY(-20px)}
}

/* ====== PAGE LOADER ====== */
.loader{
  position:fixed;inset:0;z-index:10001;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  background:#0d0b0f;
  transition:opacity .8s ease,visibility .8s ease;
}
.loader.hidden{opacity:0;visibility:hidden}
.loader-ring{
  width:50px;height:50px;
  border:1px solid rgba(212,167,106,0.15);
  border-top-color:var(--gold);
  border-radius:50%;
  animation:lspin 1.2s linear infinite;
}
@keyframes lspin{to{transform:rotate(360deg)}}
.loader p{margin-top:16px;color:var(--gold);font-size:12px;letter-spacing:5px}

/* ====== INVITATION CARD ====== */
.invitation{
  position:relative;
  width:100%;
  min-height:100vh;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  background:var(--dark);
  overflow:hidden;
  padding:20px;
}
/* Ambient glow */
.invitation::before{
  content:'';position:absolute;
  width:600px;height:600px;
  top:50%;left:50%;transform:translate(-50%,-50%);
  background:radial-gradient(circle,rgba(212,167,106,0.06) 0%,transparent 70%);
  border-radius:50%;
  pointer-events:none;
}

/* ====== CARD ====== */
.card{
  position:relative;
  max-width:520px;
  width:100%;
  background:linear-gradient(160deg,#1a1518 0%,#120f12 40%,#1a1518 100%);
  border:1px solid rgba(212,167,106,0.15);
  border-radius:6px;
  overflow:hidden;
  box-shadow:var(--shadow-lg);
}
.card-inner{
  padding:0;
}

/* Image Section */
.card-image{
  position:relative;
  width:100%;
  aspect-ratio:auto;
  overflow:hidden;
}
.card-image .split-container{
  display:flex;
  gap:4px;
  width:100%;
}
.card-image .split-container .split-item{
  flex:1;
  position:relative;
  display:block;
  overflow:hidden;
}
.card-image .split-container .split-item img{
  width:100%;
  height:auto;
  display:block;
  transition:transform 1.2s ease;
}
.card-image .split-container .split-item:hover img{
  transform:scale(1.05);
}
.card-image .overlay{
  position:absolute;inset:0;
  background:linear-gradient(180deg,
    rgba(13,11,15,0.05) 0%,
    rgba(13,11,15,0.25) 40%,
    rgba(13,11,15,0.55) 70%,
    rgba(13,11,15,0.92) 100%);
  pointer-events:none;
}
.card-image .watermark{
  position:absolute;
  top:50%;left:50%;
  transform:translate(-50%,-50%);
  font-family:'Playfair Display',serif;
  font-size:clamp(48px,10vw,90px);
  font-weight:200;
  color:var(--cream);
  opacity:0.12;
  letter-spacing:12px;
  pointer-events:none;
}

/* Content Section */
.card-content{
  padding:50px 40px 44px;
  text-align:center;
  position:relative;
}
.card-content::before{
  content:'';position:absolute;
  top:0;left:50%;transform:translateX(-50%);
  width:80px;height:1px;
  background:linear-gradient(90deg,transparent,var(--gold),transparent);
}

.ornament-top{
  font-size:12px;
  letter-spacing:8px;
  color:var(--gold);
  opacity:0.5;
  margin-bottom:16px;
}

.card-content h1{
  font-family:'Playfair Display',serif;
  font-size:clamp(28px,5vw,44px);
  font-weight:400;
  color:var(--cream);
  letter-spacing:6px;
  margin-bottom:6px;
}
.card-content .sub{
  font-family:'Playfair Display',serif;
  font-size:clamp(14px,2vw,20px);
  font-style:italic;
  color:var(--gold);
  font-weight:300;
  margin-bottom:24px;
}

.divider{
  display:flex;align-items:center;justify-content:center;
  gap:12px;
  margin-bottom:24px;
}
.divider .line{
  width:40px;height:1px;
  background:linear-gradient(90deg,transparent,var(--gold));
}
.divider .line:last-child{
  background:linear-gradient(90deg,var(--gold),transparent);
}
.divider .diamond{
  color:var(--gold);font-size:8px;
}

.card-content .invite-text{
  font-size:clamp(13px,1.3vw,16px);
  color:var(--cream);
  opacity:0.7;
  line-height:2;
  font-weight:300;
  margin-bottom:30px;
}
.card-content .invite-text em{
  color:var(--gold);
  font-style:normal;
}

/* QR Code Section */
.qr-section{
  display:flex;flex-direction:column;align-items:center;
  gap:12px;
  margin-bottom:30px;
  padding:20px;
  border:1px solid rgba(212,167,106,0.1);
  border-radius:4px;
  background:rgba(212,167,106,0.03);
}
.qr-section .qr-label{
  font-size:11px;
  letter-spacing:3px;
  color:var(--gold);
  opacity:0.6;
}
.qr-section .qr-code{
  display:flex;align-items:center;justify-content:center;
}
.qr-section .qr-code img{
  width:130px;height:130px;
  border-radius:4px;
  display:block;
  box-shadow:0 8px 30px rgba(0,0,0,.3);
  transition:transform .4s ease,box-shadow .4s ease;
}
.qr-section .qr-code img:hover{
  transform:scale(1.05);
  box-shadow:0 12px 40px rgba(212,167,106,0.2);
}
.qr-section .qr-hint{
  font-size:12px;
  color:var(--cream);
  opacity:0.4;
  letter-spacing:1px;
}

.invite-date{
  margin-bottom:28px;
}
.invite-date .label{
  font-size:11px;letter-spacing:4px;
  color:var(--gold);opacity:0.5;
  margin-bottom:6px;
}
.invite-date .date{
  font-family:'Noto Serif SC',serif;
  font-size:clamp(13px,1.5vw,17px);
  color:var(--cream);opacity:0.8;
  letter-spacing:2px;
}

.card-footer{
  padding:16px 40px 18px;
  border-top:1px solid rgba(212,167,106,0.08);
  text-align:center;
}
.card-footer p{
  font-family:'Playfair Display',serif;
  font-size:13px;
  font-style:italic;
  color:var(--gold);
  opacity:0.6;
  letter-spacing:4px;
}

/* ====== BUTTON BAR ====== */
.action-bar{
  position:fixed;
  bottom:30px;left:50%;transform:translateX(-50%);
  z-index:100;
  display:flex;gap:12px;
  align-items:center;
}
.action-btn{
  padding:10px 28px;
  background:rgba(26,21,24,0.85);
  backdrop-filter:blur(12px);
  border:1px solid rgba(212,167,106,0.2);
  color:var(--gold);
  font-family:'Noto Serif SC',serif;
  font-size:13px;letter-spacing:2px;
  cursor:pointer;
  transition:all .4s ease;
  border-radius:2px;
  text-decoration:none;
  white-space:nowrap;
}
.action-btn:hover{
  background:var(--gold);
  color:var(--dark);
  border-color:var(--gold);
  transform:translateY(-2px);
  box-shadow:0 8px 30px rgba(212,167,106,0.15);
}
.action-btn.secondary{
  background:transparent;
  border-color:rgba(212,167,106,0.12);
  color:var(--cream);
  opacity:0.6;
}
.action-btn.secondary:hover{
  opacity:1;
  border-color:rgba(212,167,106,0.3);
  background:rgba(212,167,106,0.06);
  color:var(--cream);
}

/* ====== RESPONSIVE ====== */
@media(max-width:768px){
  .card-content{padding:36px 24px 32px}
  .card-footer{padding:14px 24px 16px}
  .qr-section{padding:16px}
  .qr-section .qr-code img{width:110px;height:110px}
  .action-bar{bottom:20px;gap:8px}
  .action-btn{padding:8px 18px;font-size:12px}
}
@media(max-width:480px){
  .invitation{padding:10px}
  .card-content{padding:28px 18px 26px}
  .card-footer{padding:12px 18px 14px}
  .action-bar{flex-direction:column;gap:6px}
  .action-btn{width:200px;text-align:center}
}
</style>
</head>
<body>

<!-- Loader -->
<div class="loader" id="loader">
  <div class="loader-ring"></div>
  <p>加载中 ...</p>
</div>

<!-- Sparkle Overlay -->
<div class="sparkle-overlay" id="sparkles"></div>

<!-- Invitation Card -->
<div class="invitation">
  <div class="card">
    <div class="card-inner">
      <!-- Image -->
  <div class="card-image">
    <div class="split-container">
      <div class="split-item"><img src="web/invite_top.jpg" alt="婚纱照 上" loading="eager"></div>
      <div class="split-item"><img src="web/invite_bottom.jpg" alt="婚纱照 下" loading="eager"></div>
    </div>
    <div class="overlay"></div>
  </div>
      <!-- Content -->
      <div class="card-content">
        <div class="ornament-top">✦ ✦ ✦</div>
        <h1>执子之手</h1>
        <div class="sub">与子偕老</div>
        <div class="divider">
          <span class="line"></span>
          <span class="diamond">◆</span>
          <span class="line"></span>
        </div>
        <p class="invite-text">
          我们诚挚地邀请您<br>
          一同见证这份<em>来之不易的幸福</em><br>
          分享属于我们的<em>浪漫时刻</em>
        </p>
        <!-- QR Code -->
        <div class="qr-section">
          <span class="qr-label">✦ 扫码浏览婚纱纪念网站 ✦</span>
          <div class="qr-code">
            <img src="https://api.qrserver.com/v1/create-qr-code/?size=250x250&data=https://zhanghongen18-star.github.io/wedding/" alt="二维码" loading="lazy">
          </div>
          <span class="qr-hint">用手机扫一扫 · 查看更多婚纱照</span>
        </div>
        <div class="invite-date">
          <div class="label">— 永 恒 纪 念 —</div>
          <div class="date">Forever & Always</div>
        </div>
      </div>
      <div class="card-footer">
        <p>— ♡ 感谢您的祝福 ♡ —</p>
      </div>
    </div>
  </div>
</div>

<!-- Action Bar -->
<div class="action-bar">
  <a class="action-btn" href="https://zhanghongen18-star.github.io/wedding/" target="_blank">✦ 浏览完整相册</a>
  <a class="action-btn secondary" href="index.html">♡ 返回主页</a>
</div>

<script>
// Loader
window.addEventListener('load',()=>{
  setTimeout(()=>document.getElementById('loader').classList.add('hidden'),500);
});

// Sparkle stars
(function(){
  const c=document.getElementById('sparkles');
  const symbols=['✦','♡','·','✧'];
  for(let i=0;i<30;i++){
    const s=document.createElement('span');
    s.className='sparkle-star';
    s.textContent=symbols[Math.floor(Math.random()*symbols.length)];
    s.style.left=Math.random()*98+'%';
    s.style.top=Math.random()*98+'%';
    s.style.animationDuration=(3+Math.random()*5)+'s';
    s.style.animationDelay=Math.random()*8+'s';
    s.style.fontSize=(5+Math.random()*10)+'px';
    s.style.opacity=0.1+Math.random()*0.5;
    c.appendChild(s);
  }
})();

// Parallax effect on card image

// Scroll reveal animation
const revealObs=new IntersectionObserver((entries)=>{
  entries.forEach(e=>{
    if(e.isIntersecting){
      e.target.style.opacity='1';
      e.target.style.transform='translateY(0)';
    }
  });
},{threshold:0.2});

document.querySelectorAll('.card-content h1,.card-content .sub,.card-content .invite-text,.qr-section').forEach(el=>{
  el.style.opacity='0';
  el.style.transform='translateY(20px)';
  el.style.transition='opacity .8s ease,transform .8s ease';
  revealObs.observe(el);
});
</script>
</body>
</html>
